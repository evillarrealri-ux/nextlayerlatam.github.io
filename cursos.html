<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos de NextLayer LATAM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 960px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 40px;
    }
    .course-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .course-card {
      background: #fff;
      border-radius: 8px;
      width: 280px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s;
    }
    .course-card:hover {
      transform: translateY(-5px);
    }
    .course-card img {
      width: 100%;
      border-radius: 8px 8px 0 0;
    }
    .course-card h2 {
      font-size: 18px;
      margin: 15px 10px;
      color: #34495e;
    }
    .course-card a {
      display: inline-block;
      margin-bottom: 15px;
      padding: 10px 15px;
      background: #3498db;
      color: #fff;
      border-radius: 5px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .course-card a:hover {
      background: #2980b9;
    }
    @media (max-width: 600px) {
      .course-card {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cursos de NextLayer LATAM</h1>
    <div class="course-list">
      <!-- Concientización -->
      <div class="course-card">
        <img src="cursos/concientizacion_ciberseguridad.png" alt="Concientización en Ciberseguridad">
        <h2>Concientización en Ciberseguridad</h2>
        <a href="cursos/concientizacion.pdf" target="_blank">Ver Curso PDF</a>
      </div>
      <!-- ISO 27001 -->
      <div class="course-card">
        <img src="cursos/iso27001.png" alt="ISO 27001 – Documentación de la Norma">
        <h2>ISO 27001 – Documentación de la Norma</h2>
        <a href="cursos/iso27001_doc.pdf" target="_blank">Ver Curso PDF</a>
      </div>
      <!-- Gestión de Incidentes -->
      <div class="course-card">
        <img src="cursos/gestion_incidentes.png" alt="Gestión de Incidentes">
        <h2>Gestión de Incidentes</h2>
        <a href="cursos/gestion_de_incidentes.pdf" target="_blank">Ver Curso PDF</a>
      </div>
    </div>
  </div>
</body>
</html>
