<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextLayer Sales Copilot Demo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    /* CONTENIDO PRINCIPAL (demo simple) */
    .container {
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #a855f7;
    }

    /* WIDGET */
    #chat-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
    }

    #chat-bubble {
      width: 60px;
      height: 60px;
      cursor: pointer;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    #chat-bubble img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #chat-panel {
      width: 320px;
      height: 450px;
      background: #111827;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .hidden {
      display: none;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #1f2937;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .avatar-small {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    .chat-controls button {
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-left: 5px;
    }

    #chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
      margin-left: auto;
    }

    .bot {
      background: #374151;
      align-self: flex-start;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #333;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    .chat-input button {
      padding: 10px;
      border: none;
      background: #a855f7;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- CONTENIDO DEMO -->
  <div class="container">
    <h1>NextLayer Sales Copilot</h1>
    <p>Demo interactiva de asistente IA para ventas</p>
  </div>

  <!-- WIDGET CHAT -->
  <div id="chat-widget">

    <!-- BOTÓN AVATAR -->
    <div id="chat-bubble" onclick="toggleChat()">
      <img src="images/avatar/copilot.png" alt="Copilot Avatar">
    </div>

    <!-- PANEL CHAT -->
    <div id="chat-panel" class="hidden">

      <div class="chat-header">
        <div class="chat-title">
          <img src="images/avatar/copilot.png" class="avatar-small">
          <span>NextLayer Copilot</span>
        </div>
        <div class="chat-controls">
          <button onclick="minimizeChat()">—</button>
          <button onclick="closeChat()">✕</button>
        </div>
      </div>

      <div id="chat-messages"></div>

      <div class="chat-input">
        <input id="userInput" type="text" placeholder="Escribe tu mensaje..." />
        <button onclick="sendMessage()">Enviar</button>
      </div>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const chatPanel = document.getElementById("chat-panel");
    const chatMessages = document.getElementById("chat-messages");
    const userInput = document.getElementById("userInput");

    function toggleChat() {
      chatPanel.classList.toggle("hidden");
    }

    function minimizeChat() {
      chatPanel.classList.add("hidden");
    }

    function closeChat() {
      chatPanel.classList.add("hidden");
    }

    function addMessage(text, type) {
      const msg = document.createElement("div");
      msg.classList.add("message", type);
      msg.innerText = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (text === "") return;

      addMessage(text, "user");
      userInput.value = "";

      // Simulación de respuesta IA
      setTimeout(() => {
        addMessage("Estoy analizando tu solicitud como Copilot de ventas...", "bot");
      }, 800);
    }

    // ENTER para enviar mensaje
    userInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
