<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio SPA Simple</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 30px;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      z-index: 1000;
    }

    .menu {
      display: flex;
      gap: 20px;
      list-style: none;
    }

    .menu a {
      color: #fff;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .menu a:hover {
      background: #00bfff;
    }

    /* SECCIONES */
    .section {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-size: cover;
      background-position: center;
    }

    .section.active {
      display: flex;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <ul class="menu">
      <li><a href="#" onclick="showSection('op1')">Opción 1</a></li>
      <li><a href="#" onclick="showSection('op2')">Opción 2</a></li>
      <li><a href="#" onclick="showSection('op3')">Opción 3</a></li>
      <li><a href="#" onclick="showSection('op4')">Opción 4</a></li>
    </ul>
  </nav>

  <!-- SECCIONES -->
  <section id="op1" class="section active" style="background-image:url('image-test/img1.jpg');">
    <div class="overlay"></div>
    <div class="content">
      <h1>Opción 1</h1>
      <p>Contenido de prueba con imagen de fondo 1</p>
    </div>
  </section>

  <section id="op2" class="section" style="background-image:url('image-test/img2.jpg');">
    <div class="overlay"></div>
    <div class="content">
      <h1>Opción 2</h1>
      <p>Contenido de prueba con imagen de fondo 2</p>
    </div>
  </section>

  <section id="op3" class="section" style="background-image:url('image-test/img3.jpg');">
    <div class="overlay"></div>
    <div class="content">
      <h1>Opción 3</h1>
      <p>Contenido de prueba con imagen de fondo 3</p>
    </div>
  </section>

  <section id="op4" class="section" style="background-image:url('image-test/img4.jpg');">
    <div class="overlay"></div>
    <div class="content">
      <h1>Opción 4</h1>
      <p>Contenido de prueba con imagen de fondo 4</p>
    </div>
  </section>

  <!-- SCRIPT -->
  <script>
    function showSection(id) {
      const sections = document.querySelectorAll('.section');
      sections.forEach(sec => sec.classList.remove('active'));

      const target = document.getElementById(id);
      if (target) {
        target.classList.add('active');
      }
    }
  </script>

</body>
</html>
