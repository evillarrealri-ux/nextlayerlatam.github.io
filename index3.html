<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextLayer LATAM</title>

  <!-- SEO -->
  <meta name="description" content="Servicios de ciberseguridad, gestión IT, outsourcing y formación tecnológica en Panamá.">
  <meta property="og:title" content="NextLayer LATAM">
  <meta property="og:description" content="Soluciones IT y ciberseguridad para empresas.">
  <meta property="og:url" content="https://nextlayerlatam.com">

  <!-- Security (basic CSP) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #020617;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    section {
      padding: 100px 20px;
      min-height: 100vh;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(to bottom, #020617, #0f172a);
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
    }

    .modal-content {
      background: #0f172a;
      margin: 10% auto;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: white;
    }

    .modal-content button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .close {
      float: right;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<nav>
  <div><strong>NextLayer</strong></div>
  <div>
    <a href="#hero">Inicio</a>
    <a href="#servicios">Servicios</a>
    <a href="#contacto" onclick="openModal()">Contacto</a>
  </div>
</nav>

<section id="hero" class="hero">
  <div>
    <h1>Soluciones IT y Ciberseguridad</h1>
    <p>Transformamos la tecnología en ventaja competitiva</p>
    <button onclick="openModal()">Contáctanos</button>
  </div>
</section>

<section id="servicios">
  <h2>Servicios</h2>
  <div class="services">
    <div class="card">Ciberseguridad</div>
    <div class="card">Gestión IT</div>
    <div class="card">Outsourcing</div>
    <div class="card">Formación</div>
  </div>
</section>

<section id="contacto">
  <h2>Contacto</h2>
  <p>Haz clic en el botón para abrir el formulario.</p>
</section>

<!-- MODAL -->
<div id="ctaModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Formulario de Contacto</h2>

    <form id="contactForm" action="https://formspree.io/f/xwvroyqb" method="POST">
      <label>Nombre</label>
      <input type="text" name="name" required>

      <label>Correo</label>
      <input type="email" name="email" required>

      <label>Teléfono</label>
      <input type="tel" name="phone" required pattern="[\+0-9\s\-]{7,15}">

      <label>Mensaje</label>
      <textarea name="message" rows="4" required></textarea>

      <button type="submit">Enviar</button>
    </form>

    <p id="formStatus"></p>
  </div>
</div>

<footer>
  <p>© 2026 NextLayer LATAM</p>
</footer>

<script>
  const modal = document.getElementById("ctaModal");
  const closeBtn = document.querySelector(".close");
  const form = document.getElementById("contactForm");
  const status = document.getElementById("formStatus");

  function openModal() {
    modal.style.display = "block";
  }

  closeBtn.onclick = () => {
    modal.style.display = "none";
  }

  window.onclick = (e) => {
    if (e.target == modal) {
      modal.style.display = "none";
    }
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = new FormData(form);

    const response = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      status.innerHTML = "✅ Mensaje enviado correctamente";
      form.reset();
    } else {
      status.innerHTML = "❌ Error al enviar. Intenta nuevamente.";
    }
  });
</script>

</body>
</html>
